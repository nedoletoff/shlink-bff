# nginx.conf — Shlink BFF
# Схема: Browser → nginx → oauth2-proxy (auth) → unified-backend / web-ui
# shlink-api НЕ имеет маршрутов — доступен только через unified-backend внутри сети

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Скрываем версию nginx
    server_tokens off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(),midi=(),camera=(),usb=(),magnetometer=()" always;

    upstream unified_backend {
        server unified-backend:8080;
        keepalive 32;
    }

    upstream oauth2_proxy_shlink {
        server oauth2-proxy-shlink:4180;
        keepalive 16;
    }

    upstream web_ui {
        server web-ui:80;
        keepalive 16;
    }

    # ── shlink-create.local — защищённый интерфейс ────────────────────────────
    server {
        listen 443 ssl http2;
        server_name shlink-create.local;

        ssl_certificate     /etc/nginx/ssl/haproxy.pem;
        ssl_certificate_key /etc/nginx/ssl/haproxy.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;

        # Публичный healthcheck — без auth
        location = /healthz {
            proxy_pass http://unified_backend/healthz;
            access_log off;
        }

        # oauth2-proxy callback и статика (без auth_request)
        location /oauth2/ {
            proxy_pass              http://oauth2_proxy_shlink;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_buffer_size       128k;
            proxy_buffers           4 256k;
        }

        # Внутренний auth endpoint (только для sub-запросов nginx)
        location = /_oauth2_auth {
            internal;
            proxy_pass              http://oauth2_proxy_shlink/oauth2/auth;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length    "";
            proxy_set_header        X-Original-URI    $request_uri;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
        }

        # ── API Backend — все /api/* → unified-backend ──────────────────────
        location /api/ {
            auth_request     /_oauth2_auth;
            error_page 401 = @oauth2_redirect;

            # Захватываем identity headers, выставленные oauth2-proxy
            auth_request_set $auth_user    $upstream_http_x_auth_request_user;
            auth_request_set $auth_email   $upstream_http_x_auth_request_email;
            auth_request_set $auth_uname   $upstream_http_x_auth_request_preferred_username;
            auth_request_set $auth_groups  $upstream_http_x_auth_request_groups;

            proxy_pass              http://unified_backend;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;

            # Identity headers → unified-backend (подставляет API key из БД)
            proxy_set_header X-Auth-Request-User                 $auth_user;
            proxy_set_header X-Auth-Request-Email                $auth_email;
            proxy_set_header X-Auth-Request-Preferred-Username   $auth_uname;
            proxy_set_header X-Auth-Request-Groups               $auth_groups;

            # НЕ пробрасываем X-Shlink-API-Key — ключ живёт только в backend
            proxy_hide_header X-Shlink-API-Key;

            proxy_read_timeout    30s;
            proxy_connect_timeout 5s;
        }

        # ── Web UI SPA ────────────────────────────────────────────────────────
        location / {
            auth_request     /_oauth2_auth;
            error_page 401 = @oauth2_redirect;

            proxy_pass              http://web_ui;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
        }

        # Редирект на Keycloak login при 401
        location @oauth2_redirect {
            return 302 /oauth2/sign_in;
        }

        # ── Явный запрет /rest и /bootstrap ───────────────────────────────────
        # shlink-api НЕ доступен через nginx — только через unified-backend
        location ~ ^/(rest|bootstrap)/ {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }

        # servers.json УДАЛЁН — bootstrap модель не используется
        location = /servers.json {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }

    # ── shlink.local — публичный редиректор (без auth) ────────────────────────
    server {
        listen 443 ssl http2;
        server_name shlink.local;

        ssl_certificate     /etc/nginx/ssl/haproxy.pem;
        ssl_certificate_key /etc/nginx/ssl/haproxy.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Публичные короткие ссылки → shlink-api напрямую
        # (только публичный трафик, не admin /rest)
        location / {
            proxy_pass          http://shlink-api:8080;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # REST API shlink закрыт снаружи
        location /rest/ {
            return 403 '{"error":"forbidden"}';
            add_header Content-Type application/json;
        }
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name shlink.local shlink-create.local pb.local pb-create.local;
        return 301 https://$host$request_uri;
    }
}
