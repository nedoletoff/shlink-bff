# Shlink BFF — docker-compose
#
# Архитектура:
#   Browser → nginx → oauth2-proxy → unified-backend → shlink-api
#
# Перед запуском:
#   cp .env.example .env && vi .env
#   Скопируйте nginx/nginx.conf.example → nginx/nginx.conf
#   Скопируйте oauth2-proxy/shlink.cfg.example → oauth2-proxy/shlink.cfg
#   Положите SSL-сертификат в nginx/ssl/cert.pem

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # -- Nginx -- точка входа --
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - internal
    depends_on:
      unified-backend:
        condition: service_healthy
      web-ui:
        condition: service_healthy
      oauth2-proxy-shlink:
        condition: service_started
    logging: *default-logging
    restart: unless-stopped

  # -- PostgreSQL --
  postgres:
    image: postgres:17-alpine
    container_name: postgres-shlink
    environment:
      POSTGRES_DB:       ${SHLINK_DB_NAME}
      POSTGRES_USER:     ${SHLINK_DB_USER}
      POSTGRES_PASSWORD: ${SHLINK_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./unified-backend/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    networks:
      - internal
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SHLINK_DB_USER} -d ${SHLINK_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # -- Shlink API -- внутренний сервис, без публичных портов --
  shlink-api:
    image: shlinkio/shlink:4.4.3
    container_name: shlink-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_DRIVER:        postgres
      DB_HOST:          postgres
      DB_NAME:          ${SHLINK_DB_NAME}
      DB_USER:          ${SHLINK_DB_USER}
      DB_PASSWORD:      ${SHLINK_DB_PASSWORD}
      DEFAULT_DOMAIN:   ${DOMAIN_SHORT}
      IS_HTTPS_ENABLED: "true"
      INITIAL_API_KEY:  ${ADMIN_SHLINK_API_KEY}
    volumes:
      - shlink_data:/data
    networks:
      - internal
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/rest/v2/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  # -- Unified Backend (Go) --
  unified-backend:
    build:
      context: ./unified-backend
      dockerfile: Dockerfile
    container_name: unified-backend
    environment:
      HTTP_ADDR:                    ":8080"
      DATABASE_URL:                 "postgres://${SHLINK_DB_USER}:${SHLINK_DB_PASSWORD}@postgres:5432/${SHLINK_DB_NAME}?sslmode=disable"
      SHLINK_INTERNAL_URL:          "http://shlink-api:8080"
      FEATURE_USER_SLUG_PREFIX:     ${FEATURE_USER_SLUG_PREFIX:-false}
      FEATURE_USER_TAG_INTERNAL_ID: ${FEATURE_USER_TAG_INTERNAL_ID:-false}
    networks:
      - internal
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      shlink-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # -- Web UI (React SPA) --
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: web-ui
    networks:
      - internal
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  # -- oauth2-proxy для shlink-create --
  # SECURITY: зафиксирован тег, не использовать latest
  oauth2-proxy-shlink:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    container_name: oauth2-proxy-shlink
    volumes:
      - ./oauth2-proxy/shlink.cfg:/oauth2-proxy.cfg:ro
    command: --config=/oauth2-proxy.cfg
    extra_hosts:
      - "${KEYCLOAK_HOST}:${KEYCLOAK_IP}"
    networks:
      - internal
    expose:
      - "4180"
    environment:
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET_SHLINK}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET}
    logging: *default-logging
    restart: unless-stopped

volumes:
  postgres_data:
  shlink_data:

networks:
  internal:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
